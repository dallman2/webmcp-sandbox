services:
  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: webmcp-sandbox:latest
    container_name: webmcp-sandbox
    ports:
      - "3000:3000"
      # VNC debugging. macOS: port 5900 is typically held by launchd (Screen Sharing).
      # Free it first (`sudo launchctl unload -w /System/Library/LaunchDaemons/com.apple.screensharing.plist`)
      # or change to a free port:
      # - "5901:5900"
    environment:
      - SANDBOX_TARGET_URL=http://localhost:3000/fixtures/hello.html
    # macOS: uncomment the line below for host :8180 reachability
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    # Linux: use network_mode instead of extra_hosts
    # network_mode: host
